<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200" role="img" aria-labelledby="title desc">
  <title id="title">Stitch official SDK workflow (schematic)</title>
  <desc id="desc">Environment STITCH_API_KEY and Node run @google/stitch-sdk calling Stitch MCP API to get Project and Screen with HTML and screenshot URLs.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#58a6ff"/>
    </marker>
  </defs>
  <rect width="720" height="200" fill="url(#bg)" rx="12"/>
  <text x="360" y="32" fill="#8b949e" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">Community schematic - not from Google</text>
  <g font-family="system-ui,sans-serif" font-size="13" filter="url(#shadow)">
    <rect x="24" y="56" width="120" height="56" rx="8" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
    <text x="84" y="82" fill="#e6edf3" text-anchor="middle">env</text>
    <text x="84" y="98" fill="#7ee787" text-anchor="middle" font-size="11">STITCH_API_KEY</text>
    <text x="84" y="146" fill="#8b949e" text-anchor="middle" font-size="11">Node 18+</text>
    <path d="M144 84 H168" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="172" y="56" width="130" height="56" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="237" y="82" fill="#e6edf3" text-anchor="middle">@google/</text>
    <text x="237" y="98" fill="#79c0ff" text-anchor="middle">stitch-sdk</text>
    <path d="M302 84 H326" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="330" y="56" width="100" height="56" rx="8" fill="#21262d" stroke="#d2a866" stroke-width="1.5"/>
    <text x="380" y="88" fill="#e6edf3" text-anchor="middle">Stitch</text>
    <text x="380" y="104" fill="#e3b341" text-anchor="middle" font-size="11">MCP / API</text>
    <path d="M430 84 H454" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="458" y="56" width="92" height="56" rx="8" fill="#21262d" stroke="#a371f7" stroke-width="1.5"/>
    <text x="504" y="88" fill="#e6edf3" text-anchor="middle">Project</text>
    <path d="M550 84 H574" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="578" y="56" width="92" height="56" rx="8" fill="#21262d" stroke="#a371f7" stroke-width="1.5"/>
    <text x="624" y="88" fill="#e6edf3" text-anchor="middle">Screen</text>
  </g>
  <g transform="translate(0, 130)">
    <rect x="330" y="0" width="340" height="44" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="500" y="28" fill="#8b949e" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Output: getHtml() / getImage() URLs - terms from Google apply</text>
  </g>
</svg>
